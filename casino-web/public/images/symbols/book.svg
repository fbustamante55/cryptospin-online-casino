    <!-- Símbolo en el centro -->
    <path d="M20,15 
             L20,23" 
          stroke="#f7cc4f" stroke-width="1.5" fill="none"/>
    
    <!-- Círculo dorado en el centro (Ojo de Horus) -->
    <circle cx="20" cy="18" r="3" fill="#f7cc4f"/>
    <path d="M17,18 L23,18" stroke="#382518" stroke-width="0.8"/>
    <path d="M20,15 L20,21" stroke="#382518" stroke-width="0.8"/>
    
    <!-- Cobertura del libro -->
    <rect x="6" y="7" width="28" height="3" fill="#8b5d3b" stroke="#f7cc4f" stroke-width="1"/>
    <rect x="6" y="28" width="28" height="5" fill="#8b5d3b" stroke="#f7cc4f" stroke-width="1"/>
    
    <!-- Cierres del libro -->
    <path d="M8,7 L8,33 M32,7 L32,33" stroke="#f7cc4f" stroke-width="0.8"/>
    <rect x="7" y="8" width="2" height="22" fill="#8b5d3b"/>
    <rect x="31" y="8" width="2" height="22" fill="#8b5d3b"/>
