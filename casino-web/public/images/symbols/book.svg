<?xml version="1.0" encoding="UTF-8"?>
<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <circle cx="20" cy="20" r="19" fill="#63473D" stroke="#f7cc4f" stroke-width="1"/>
  
  <!-- Libro abierto -->
  <g>
    <!-- Página izquierda -->
    <path d="M6,14 
             C6,28 17,28 19,28
             L19,10
             C17,10 6,10 6,14Z" 
          fill="#fff8e1" stroke="#f7cc4f" stroke-width="1"/>
          
    <!-- Página derecha -->
    <path d="M34,14 
             C34,28 23,28 21,28
             L21,10
             C23,10 34,10 34,14Z" 
          fill="#fff8e1" stroke="#f7cc4f" stroke-width="1"/>
    
    <!-- Líneas del libro -->
    <path d="M11,16 L17,16 M11,19 L17,19 M11,22 L17,22 M11,25 L15,25" 
          stroke="#382518" stroke-width="0.8" fill="none"/>
    <path d="M23,16 L29,16 M23,19 L29,19 M23,22 L29,22 M25,25 L29,25" 
