<?xml version="1.0" encoding="UTF-8"?>
<svg width="120" height="300" viewBox="0 0 120 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Estatua egipcia derecha (Bastet) -->
  
  <!-- Base de la estatua -->
  <rect x="30" y="240" width="60" height="40" fill="#63473D" stroke="#f7cc4f" stroke-width="2"/>
  <rect x="20" y="280" width="80" height="20" fill="#8b5d3b" stroke="#f7cc4f" stroke-width="2"/>
  
  <!-- Cuerpo de la estatua -->
  <rect x="40" y="140" width="40" height="100" fill="#63473D" stroke="#f7cc4f" stroke-width="1.5"/>
  
  <!-- Decoración del cuerpo -->
  <path d="M40,170 L80,170 M40,200 L80,200" stroke="#f7cc4f" stroke-width="1" fill="none"/>
  <rect x="50" y="170" width="20" height="30" fill="#382518" stroke="#f7cc4f" stroke-width="1"/>
  
  <!-- Brazos -->
  <path d="M40,160 
           L30,180 L40,190" 
        fill="#63473D" stroke="#f7cc4f" stroke-width="1.5"/>
  
  <path d="M80,160 
           L90,180 L80,190" 
        fill="#63473D" stroke="#f7cc4f" stroke-width="1.5"/>
  
  <!-- Collar -->
  <path d="M40,140 
           C40,150 80,150 80,140" 
        fill="#f7cc4f" stroke="#f7cc4f" stroke-width="1"/>
  
  <!-- Cabeza de Bastet (gato) -->
  <path d="M40,80 
           C40,40 80,40 80,80
           L80,140 L40,140 Z" 
        fill="#63473D" stroke="#f7cc4f" stroke-width="1.5"/>
  
  <!-- Orejas -->
  <path d="M45,60 
           L30,30 L40,65" 
        fill="#63473D" stroke="#f7cc4f" stroke-width="1.5"/>
  
  <path d="M75,60 
           L90,30 L80,65" 
        fill="#63473D" stroke="#f7cc4f" stroke-width="1.5"/>
  
  <!-- Ojos -->
  <ellipse cx="50" cy="100" rx="4" ry="8" fill="#f7cc4f"/>
  <ellipse cx="70" cy="100" rx="4" ry="8" fill="#f7cc4f"/>
  
  <!-- Pupilas -->
  <ellipse cx="50" cy="100" rx="1" ry="4" fill="#382518"/>
  <ellipse cx="70" cy="100" rx="1" ry="4" fill="#382518"/>
  
  <!-- Nariz y boca -->
  <path d="M60,110 
           C55,115 65,115 60,110" 
        fill="none" stroke="#f7cc4f" stroke-width="1"/>
  
  <!-- Collar egipcio -->
  <path d="M35,132 
           C45,142 75,142 85,132" 
        fill="#f7cc4f" stroke="#382518" stroke-width="1"/>
  
  <!-- Joya del tocado -->
  <circle cx="60" cy="60" r="7" fill="#f7cc4f" stroke="#382518" stroke-width="1"/>
  <circle cx="60" cy="60" r="3" fill="#e53935"/>
</svg>