<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="luxury-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#434343" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
    <linearGradient id="gold-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BF953F" />
      <stop offset="50%" stop-color="#FCF6BA" />
      <stop offset="70%" stop-color="#B38728" />
      <stop offset="100%" stop-color="#FBF5B7" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3" />
    </filter>
    <filter id="diamond-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Luxury background -->
  <rect width="300" height="200" fill="url(#luxury-gradient)" />
  
  <!-- Champagne glass -->
  <path d="M80,120 L100,120 L90,75 L80,120 z" fill="#f5f5f5" fill-opacity="0.7" />
  <ellipse cx="90" cy="75" rx="10" ry="5" fill="#f5f5f5" fill-opacity="0.7" />
  <rect x="87" y="120" width="6" height="15" fill="#f5f5f5" fill-opacity="0.7" />
  <ellipse cx="90" cy="135" rx="10" ry="3" fill="#f5f5f5" fill-opacity="0.7" />
  
  <!-- Luxury yacht -->
  <path d="M200,100 L240,100 L230,80 L210,80 z" fill="white" />
  <rect x="215" y="70" width="10" height="10" fill="white" />
  <path d="M180,100 L250,100 L215,110 z" fill="white" />
  <path d="M200,100 L230,100 L215,110 z" fill="#555" />
  
  <!-- Wheel of fortune -->
  <circle cx="150" cy="90" r="40" fill="url(#gold-gradient)" filter="url(#shadow)" />
  <circle cx="150" cy="90" r="35" fill="#1c1c1c" />
  <circle cx="150" cy="90" r="5" fill="url(#gold-gradient)" />
  
  <!-- Wheel sections -->
  <path d="M150,90 L150,55 A35,35 0 0,1 185,90 z" fill="#D4AF37" />
  <path d="M150,90 L185,90 A35,35 0 0,1 150,125 z" fill="#ffffff" />
  <path d="M150,90 L150,125 A35,35 0 0,1 115,90 z" fill="#D4AF37" />
  <path d="M150,90 L115,90 A35,35 0 0,1 150,55 z" fill="#ffffff" />
  
  <!-- Diamonds/jewels -->
  <polygon points="60,40 70,30 80,40 70,50" fill="#a5d6ff" filter="url(#diamond-glow)" />
  <polygon points="240,40 250,30 260,40 250,50" fill="#ffcba9" filter="url(#diamond-glow)" />
  
  <!-- JACKPOT text -->
  <text x="150" y="45" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="url(#gold-gradient)">JACKPOT</text>
  
  <!-- Title -->
  <text x="150" y="170" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">Mega Fortune</text>
  <text x="150" y="188" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ddd">94% RTP - Very High Volatility</text>
</svg>