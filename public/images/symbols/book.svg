<?xml version="1.0" encoding="UTF-8"?>
<svg width="30" height="30" viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
  <!-- Libro cerrado (base) -->
  <rect x="5" y="8" width="20" height="14" rx="1" fill="#002a5e" stroke="#ffc700" stroke-width="1"/>
  
  <!-- Cubierta del libro -->
  <rect x="5" y="8" width="20" height="3" rx="1" fill="#00316b" stroke="#ffc700" stroke-width="1"/>
  <rect x="5" y="19" width="20" height="3" rx="1" fill="#00316b" stroke="#ffc700" stroke-width="1"/>
  
  <!-- Divisiones de páginas -->
  <path d="M5,12 L25,12" stroke="#ffc700" stroke-width="0.5"/>
  <path d="M5,16 L25,16" stroke="#ffc700" stroke-width="0.5"/>
  
  <!-- Símbolo de ojo egipcio (Ojo de Horus) en la portada -->
  <path d="M10,10 
           C12,8 18,8 20,10
           C19,12 11,12 10,10Z"
        fill="#ffc700" stroke="#ffd700" stroke-width="0.3"/>
  <circle cx="15" cy="10" r="1" fill="#00316b"/>
  <path d="M16,10 L18,6" stroke="#ffc700" stroke-width="0.5"/>
  <path d="M14,10 L12,6" stroke="#ffc700" stroke-width="0.5"/>
  
  <!-- Detalle decorativo en el centro -->
  <circle cx="15" cy="14" r="3" fill="#002a5e" stroke="#ffc700" stroke-width="0.8"/>
  <circle cx="15" cy="14" r="2" fill="#00316b" stroke="#ffc700" stroke-width="0.3"/>
  <path d="M13,14 L17,14" stroke="#ffc700" stroke-width="0.5"/>
  <path d="M15,12 L15,16" stroke="#ffc700" stroke-width="0.5"/>
  
  <!-- Texto simulado (jeroglíficos) -->
  <path d="M8,20 L10,20" stroke="#ffc700" stroke-width="0.5"/>
  <path d="M12,20 L14,20" stroke="#ffc700" stroke-width="0.5"/>
  <path d="M16,20 L18,20" stroke="#ffc700" stroke-width="0.5"/>
  <path d="M20,20 L22,20" stroke="#ffc700" stroke-width="0.5"/>
  
  <!-- Brillo dorado -->
  <circle cx="8" cy="10" r="0.5" fill="#ffd700"/>
  <circle cx="22" cy="10" r="0.5" fill="#ffd700"/>
  <circle cx="8" cy="20" r="0.5" fill="#ffd700"/>
  <circle cx="22" cy="20" r="0.5" fill="#ffd700"/>
  
  <!-- Resplandor mágico -->
  <ellipse cx="15" cy="14" rx="7" ry="5" fill="#ffc700" opacity="0.2"/>
</svg>