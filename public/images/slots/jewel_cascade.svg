<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="diamond-gradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="70%" stop-color="#e0f7fa" />
      <stop offset="100%" stop-color="#80deea" />
    </radialGradient>
    <radialGradient id="ruby-gradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#ffcdd2" />
      <stop offset="70%" stop-color="#ef5350" />
      <stop offset="100%" stop-color="#b71c1c" />
    </radialGradient>
    <radialGradient id="emerald-gradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#c8e6c9" />
      <stop offset="70%" stop-color="#66bb6a" />
      <stop offset="100%" stop-color="#1b5e20" />
    </radialGradient>
    <radialGradient id="sapphire-gradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#bbdefb" />
      <stop offset="70%" stop-color="#42a5f5" />
      <stop offset="100%" stop-color="#0d47a1" />
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3" />
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="200" fill="#0f2027" />
  <path d="M0,0 L300,0 L300,200 L0,200 z" fill="#0f2027" />
  
  <!-- Jewels -->
  <!-- Diamond -->
  <polygon points="90,60 110,40 130,60 110,80" fill="url(#diamond-gradient)" filter="url(#glow)" />
  
  <!-- Ruby -->
  <polygon points="190,60 210,40 230,60 210,80" fill="url(#ruby-gradient)" filter="url(#glow)" />
  
  <!-- Emerald -->
  <polygon points="140,100 160,80 180,100 160,120" fill="url(#emerald-gradient)" filter="url(#glow)" />
  
  <!-- Sapphire -->
  <polygon points="90,140 110,120 130,140 110,160" fill="url(#sapphire-gradient)" filter="url(#glow)" />
  
  <!-- Cascade lines -->
  <path d="M50,30 L250,30" stroke="#555" stroke-width="1" stroke-dasharray="5,5" />
  <path d="M50,70 L250,70" stroke="#555" stroke-width="1" stroke-dasharray="5,5" />
  <path d="M50,110 L250,110" stroke="#555" stroke-width="1" stroke-dasharray="5,5" />
  <path d="M50,150 L250,150" stroke="#555" stroke-width="1" stroke-dasharray="5,5" />
  
  <!-- Title -->
  <text x="150" y="30" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white">Jewel Cascade</text>
  <text x="150" y="188" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#ddd">97% RTP - High Volatility</text>
  
  <!-- Feature badge -->
  <rect x="190" y="140" width="100" height="25" rx="12.5" fill="rgba(255,255,255,0.2)" />
  <text x="240" y="158" font-family="Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="white">CASCADING WINS</text>
</svg>